version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434

  bot:
    build: .
    command: python bot/slack.py
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
    depends_on:
      - api
