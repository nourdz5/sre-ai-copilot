apiVersion: v1
kind: Namespace
metadata:
  name: sre-copilot
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sre-copilot
  namespace: sre-copilot
---
# Role lives in 'default' because that's where monitored services (pods/logs) are
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sre-copilot-role
  namespace: default
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list"]
---
# RoleBinding in 'default' grants the SA (from sre-copilot ns) access to pods/logs in 'default'
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sre-copilot-binding
  namespace: default
subjects:
- kind: ServiceAccount
  name: sre-copilot
  namespace: sre-copilot
roleRef:
  kind: Role
  name: sre-copilot-role
  apiGroup: rbac.authorization.k8s.io
